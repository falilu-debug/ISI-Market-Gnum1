<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISI-Market - Déposer une annonce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h3>ISI<span>MARKET</span></h3>
        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="formulaire.html">Déposer</a></li>
                <li><a href="stats.html">Stats</a></li>
            </ul>
        </nav>
    </header>
    <div>
        <div class="form-body">
            <div class="titre-form">Déposer une annonce</div>
            <form id="form-annonce">
                <div class="form-g">
                    <label for="titre">Titre</label>
                    <input type="text" id="titre" class="form-c" placeholder="Ex: Algorithmique" required>
                    <small>Minimum 5 caractères</small>
                </div>
                <div class="form-g">
                    <label for="description">Description</label>
                    <textarea id="description" class="form-c" placeholder="Décrivez votre annonce..."></textarea>
                </div>
                <div class="form-g">
                    <label for="categorie">Catégorie</label>
                    <select id="categorie" class="form-c" required>
                        <option value="">Choisissez une catégorie</option>
                        <option value="Livres">Livres</option>
                        <option value="Materiel">Matériel</option>
                        <option value="Services">Services</option>
                        <option value="Autres">Autres</option>
                    </select>
                </div>
                <div class="form-g">
                    <label for="prix">Prix (CFA)</label>
                    <input type="number" id="prix" class="form-c" placeholder="Ex: 15000" min="1" required>
                </div>

                <!-- État -->
                <div class="form-g">
                    <label for="etat">État</label>
                    <select id="etat" class="form-c" required>
                        <option value="Neuf">Neuf</option>
                        <option value="Bon état" selected>Bon état</option>
                        <option value="Usagé">Usagé</option>
                    </select>
                </div>
                <div class="form-g">
                    <label for="nom">Votre nom complet</label>
                    <input type="text" id="nom" class="form-c" placeholder="Ex: Aminata Diop" required>
                </div>
                <div class="form-g">
                    <label for="contact">Contact</label>
                    <input type="email" id="contact" class="form-c" placeholder="Ex: amina@etu.isi.sn" required>
                </div>
                <div class="btn-">
                    <button type="submit" class="btn-ajout">Deposer</button>
                    <button type="reset" class="btn-annul" onclick="window.location.href='index.html'">Annuler</button>
                </div>
            </form>
            <div>
                <button type="button" id="btn-prevusia">Prévisualiser</button>
            </div>
            <div id="preview">

            </div>
        </div>
    </div>

    <footer>
        <div>
            <h3>&copy; 2026 ISI<span>MARKET</span></h3>
            <div class="row">
                <a href="index.html">Accueil</a>
                <a href="formulaire.html">Déposer</a>
                <a href="stats.html">Stats</a>
            </div>

        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
